name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff

      - name: Lint
        run: ruff check .

      - name: Unit tests
        run: pytest -q
        env:
          # Avoids a TensorFlow native DLL / plugin-autoload conflict seen in
          # environments with many unrelated pytest-plugin-registering packages
          # installed; harmless and cheap to keep on for CI too.
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

      - name: Smoke-test training pipeline (tiny synthetic data, no GPU/pretrained weights)
        run: python -m src.train
        env:
          SMOKE_TEST: "true"
